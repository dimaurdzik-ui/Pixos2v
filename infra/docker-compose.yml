version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: pixos
      POSTGRES_PASSWORD: pixos_password
      POSTGRES_DB: pixos_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixos -d pixos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
